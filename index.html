<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nguhma.github.io</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: #7c6aff;
    }

    p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, <span>World</span> 👋</h1>
    <p>Mon site arrive bientôt.</p>
  </div>
</body>
</html>
