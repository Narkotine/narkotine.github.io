<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nguhma — News</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0f0f0f;
      border-bottom: 1px solid #1e1e1e;
      padding: 1.2rem 2rem;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo span { color: #7c6aff; }

    /* ── Feed selector ── */
    nav {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    nav button {
      background: transparent;
      color: #888;
      border: 1px solid #2a2a2a;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    nav button:hover { color: #ccc; border-color: #444; }

    nav button.active {
      background: #7c6aff;
      color: #fff;
      border-color: #7c6aff;
    }

    /* ── Main content ── */
    #content-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .feed-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .feed-subtitle {
      color: #555;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    /* ── Article cards ── */
    .article {
      border-radius: 10px;
      padding: 1.6rem;
      margin-bottom: 1.2rem;
      background: #161616;
      border: 1px solid #222;
      transition: border-color 0.2s;
    }

    .article:hover { border-color: #333; }

    /* ── Fresh article : golden glow ── */
    .article.fresh {
      background: linear-gradient(135deg, #1a1600 0%, #1c1400 60%, #161200 100%);
      border-color: #4a3800;
      box-shadow: 0 0 0 1px #4a3800, 0 4px 24px rgba(180, 130, 0, 0.12);
    }

    .fresh-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #c9960a;
      background: rgba(180, 130, 0, 0.12);
      border: 1px solid rgba(180, 130, 0, 0.25);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.7rem;
    }

    /* ── Article meta ── */
    .article-meta {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }

    .article-date { font-size: 0.8rem; color: #555; }

    .article-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }

    .tag {
      font-size: 0.7rem;
      background: #1a1a2e;
      color: #7c6aff;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
    }

    .article.fresh .tag {
      background: rgba(180, 130, 0, 0.1);
      color: #c9960a;
    }

    .article-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      line-height: 1.4;
      color: #e8e8e8;
    }

    /* ── Markdown rendering ── */
    .article-body { font-size: 0.9rem; color: #aaa; line-height: 1.7; }

    .article-body h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #ddd;
      margin: 1.4rem 0 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid #1e1e1e;
    }

    .article.fresh .article-body h2 { border-top-color: #2a2000; }

    .article-body h2:first-child { margin-top: 0; padding-top: 0; border-top: none; }

    .article-body p { margin-bottom: 0.6rem; }

    .article-body ul {
      margin: 0.4rem 0 0.6rem 1.2rem;
    }

    .article-body li { margin-bottom: 0.3rem; }

    .article-body strong { color: #e0e0e0; font-weight: 600; }

    .article-body em { color: #999; font-style: italic; }

    .article-body a {
      color: #7c6aff;
      text-decoration: none;
    }

    .article-body a:hover { text-decoration: underline; }

    .article.fresh .article-body a { color: #c9960a; }

    .article-body hr {
      border: none;
      border-top: 1px solid #1e1e1e;
      margin: 1.2rem 0;
    }

    .article.fresh .article-body hr { border-top-color: #2a2000; }

    /* ── Empty / Loading ── */
    .empty, .loading {
      text-align: center;
      color: #444;
      padding: 4rem 0;
      font-size: 0.95rem;
    }

    /* ── Responsive mobile ── */
    @media (max-width: 600px) {
      header { padding: 1rem; }

      nav { width: 100%; }

      nav button {
        flex: 1;
        text-align: center;
        padding: 0.5rem;
      }

      #content-wrapper { padding: 1.2rem 0.8rem 3rem; }

      .feed-title { font-size: 1.3rem; }

      .article { padding: 1.2rem; }

      .article-title { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">nguhma<span>.</span></div>
  </header>

  <main id="content-wrapper">
    <nav id="feed-nav"></nav>
    <div id="content"><div class="loading">Chargement…</div></div>
  </main>

  <script>
    const FEEDS = {
      geopolitks: {
        file: 'data/geopolitks.json',
        title: 'Geopolitks',
        subtitle: 'Géopolitique, conflits & diplomatie'
      },
      'ai-newz': {
        file: 'data/ai-newz.json',
        title: 'AI Newz',
        subtitle: 'Intelligence artificielle, tech & régulation'
      }
    };

    let currentFeed = Object.keys(FEEDS)[0];

    // ── Marked config ──
    marked.setOptions({ breaks: true, gfm: true });

    // ── Build nav ──
    function buildNav() {
      const nav = document.getElementById('feed-nav');
      nav.innerHTML = '';
      for (const [key, feed] of Object.entries(FEEDS)) {
        const btn = document.createElement('button');
        btn.textContent = feed.title;
        btn.className = key === currentFeed ? 'active' : '';
        btn.addEventListener('click', () => switchFeed(key));
        nav.appendChild(btn);
      }
    }

    // ── Format date ──
    function formatDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('fr-FR', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    // ── Today's date string ──
    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    // ── Render articles ──
    function renderArticles(articles, feed) {
      const main = document.getElementById('content');
      const today = todayISO();

      if (!articles.length) {
        main.innerHTML = `
          <h2 class="feed-title">${feed.title}</h2>
          <p class="feed-subtitle">${feed.subtitle}</p>
          <div class="empty">Aucun article pour le moment.</div>`;
        return;
      }

      articles.sort((a, b) => new Date(b.date) - new Date(a.date));

      let html = `
        <h2 class="feed-title">${feed.title}</h2>
        <p class="feed-subtitle">${feed.subtitle}</p>`;

      for (const a of articles) {
        const isFresh = a.fresh === true || a.date === today;
        const tags = (a.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
        const bodyHTML = marked.parse(a.content || '');

        html += `
        <article class="article${isFresh ? ' fresh' : ''}">
          ${isFresh ? '<div class="fresh-badge">⚡ Nouveau</div>' : ''}
          <div class="article-meta">
            <span class="article-date">${formatDate(a.date)}</span>
            <div class="article-tags">${tags}</div>
          </div>
          <h3 class="article-title">${a.title}</h3>
          <div class="article-body">${bodyHTML}</div>
        </article>`;
      }

      main.innerHTML = html;
    }

    // ── Load feed ──
    async function loadFeed(key) {
      const feed = FEEDS[key];
      document.getElementById('content').innerHTML = '<div class="loading">Chargement…</div>';
      try {
        const res = await fetch(feed.file + '?v=' + Date.now());
        if (!res.ok) throw new Error();
        const articles = await res.json();
        renderArticles(articles, feed);
      } catch {
        document.getElementById('content').innerHTML = `
          <h2 class="feed-title">${feed.title}</h2>
          <p class="feed-subtitle">${feed.subtitle}</p>
          <div class="empty">Impossible de charger les articles.</div>`;
      }
    }

    // ── Switch feed ──
    function switchFeed(key) {
      currentFeed = key;
      buildNav();
      loadFeed(key);
    }

    // ── Init ──
    buildNav();
    loadFeed(currentFeed);
  </script>

</body>
</html>
