<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nguhma — Galaxy Snacks</title>
  <meta
    name="description"
    content="Galaxy Snacks rassemble les briefs quotidiens AI & Robotics et Geopolitiks en français et en anglais."
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-block">
        <p class="eyebrow">Daily briefing terminal</p>
        <div class="logo">nguhma<span>.</span></div>
      </div>
      <div class="lang-switch" id="lang-switch" aria-label="Language switcher"></div>
    </header>

    <main class="layout" id="app">
      <section class="hero-panel" aria-labelledby="hero-title">
        <p class="hero-kicker">Galaxy Snacks</p>
        <h1 id="hero-title">Two sharp feeds. One compact archive.</h1>
        <p class="hero-copy">
          Briefings quotidiens sur l'IA, la robotique et la géopolitique
          technologique, avec bascule de langue et lecture d'archives.
        </p>
        <div class="hero-meta" id="hero-meta"></div>
      </section>

      <section class="feed-panel">
        <nav class="feed-nav" id="feed-nav" aria-label="Feed categories"></nav>
        <div id="content" class="feed-content">
          <div class="loading">Loading</div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="assets/app.js"></script>
</body>
</html>
